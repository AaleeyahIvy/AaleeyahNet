# Aaleeyah.net — nginx reverse proxy in front of the Next.js server
upstream nextjs {
    server web:3000;
}

server {
    listen 80;
    server_name aaleeyah.net www.aaleeyah.net;
    # server_name _;   # <- use this instead while testing without DNS

    client_max_body_size 1m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # hashed build assets: cache hard, forever
    location /_next/static/ {
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # everything else (pages + /api/likes + /api/guestbook)
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

